name: Publish

on:
  release:
    types: [published]

jobs:
  deploy:
    environment: pypi
    permissions:
      id-token: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.9"
          version: "0.9.2"
          enable-cache: true

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build wheel and sdist
        run: uv build

      - name: Publish to PyPI
        run: uv publish

      - name: Get crates.io token
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish to crates.io
        working-directory: crates/peakrdl-rust-build
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish

  smoke-test:
    needs: [deploy]
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
          - os: ubuntu-24.04-arm
            target: linux-aarch64
          - os: macos-15-intel
            target: darwin-x86_64
          - os: macos-latest
            target: darwin-aarch64
          - os: windows-latest
            target: windows-x86_64

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: armv7a-none-eabi

      - name: Smoke test
        working-directory: crates/smoke-test
        run: cargo build --target armv7a-none-eabi
