name: Publish

on:
  release:
    types: [published]

jobs:
  deploy:
    environment: pypi
    permissions:
      id-token: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.9"
          version: "0.9.2"
          enable-cache: true

      - name: Build wheel and sdist
        run: uv build

      - name: Publish to PyPI
        run: uv publish
